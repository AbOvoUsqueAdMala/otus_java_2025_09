syntax = "proto3";

package ru.otus.numbers;

option java_multiple_files = true;
option java_package = "ru.otus.numbers.protobuf";
option java_outer_classname = "NumbersProto";

message NumbersRequest {
  int32 firstValue = 1;
  int32 lastValue = 2;
}

message NumberResponse {
  int32 value = 1;
}

service NumbersService {
  rpc GetNumbers(NumbersRequest) returns (stream NumberResponse);
}

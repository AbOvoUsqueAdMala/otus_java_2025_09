<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients Admin</title>
    <style>
        :root {
            color-scheme: light;
            --page-bg: radial-gradient(circle at top, #eaf2e4 0%, #f5efe8 48%, #f3f6ef 100%);
            --surface: rgba(255, 255, 255, 0.9);
            --surface-border: #dbe3d7;
            --text-main: #253129;
            --text-muted: #5e6c61;
            --accent: #41644d;
            --accent-light: #eef4eb;
            --success-bg: #deefe2;
            --success-text: #1f6233;
            --error-bg: #f7e1dc;
            --error-text: #8d4333;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
            color: var(--text-main);
            background: var(--page-bg);
        }

        .layout {
            width: min(1180px, calc(100vw - 32px));
            margin: 32px auto;
            display: grid;
            gap: 24px;
            grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        }

        .panel {
            padding: 24px;
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            background: var(--surface);
            box-shadow: 0 20px 50px rgba(38, 49, 41, 0.08);
            backdrop-filter: blur(10px);
        }

        h1, h2 {
            margin: 0 0 12px;
        }

        p {
            margin: 0 0 16px;
            line-height: 1.5;
            color: var(--text-muted);
        }

        label {
            display: block;
            margin-bottom: 16px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            margin-top: 8px;
            padding: 12px 14px;
            border: 1px solid #c8d1c5;
            border-radius: 14px;
            font: inherit;
            background: #fff;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px 16px;
            border: 0;
            border-radius: 14px;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
        }

        button:hover {
            opacity: 0.96;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
        }

        .message.success {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .message.error {
            background: var(--error-bg);
            color: var(--error-text);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #e4ebe0;
            vertical-align: top;
        }

        th {
            font-size: 0.88rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
        }

        .count {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .empty {
            padding: 24px 0 8px;
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="layout">
    <section class="panel">
        <h1>Create Client</h1>
        <p>Each client must contain a name, one address and at least one phone number.</p>

        <form method="post" th:action="@{/clients}" th:object="${form}">
            <label>
                Name
                <input type="text" th:field="*{name}" placeholder="Ivan Ivanov" required>
            </label>

            <label>
                Address
                <input type="text" th:field="*{street}" placeholder="Lenina 10" required>
            </label>

            <label>
                Phones
                <textarea th:field="*{phones}" placeholder="13-555-22, 14-666-333" required></textarea>
            </label>

            <button type="submit">Save Client</button>
        </form>
    </section>

    <section class="panel">
        <h2>Clients List</h2>
        <p><span class="count" th:text="${#lists.size(clients)} + ' total'">0 total</span></p>

        <div class="message success" th:if="${successMessage != null}" th:text="${successMessage}">
            Client has been saved
        </div>

        <div class="message error" th:if="${errorMessage != null}" th:text="${errorMessage}">
            Validation error
        </div>

        <div class="empty" th:if="${#lists.isEmpty(clients)}">No clients have been created yet.</div>
        <table th:unless="${#lists.isEmpty(clients)}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Address</th>
                <th>Phones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="client : ${clients}">
                <td th:text="${client.id}">1</td>
                <td th:text="${client.name}">Ivan Ivanov</td>
                <td th:text="${client.address != null ? client.address.street : ''}">Lenina 10</td>
                <td>
                    <span th:each="phone, phoneStat : ${client.phones}">
                        <span th:text="${phone.number}">13-555-22</span><br th:if="${!phoneStat.last}">
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>

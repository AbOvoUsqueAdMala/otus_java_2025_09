<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        :root {
            color-scheme: light;
            --page-bg: linear-gradient(135deg, #f4efe6 0%, #e8f0e1 100%);
            --panel-bg: rgba(255, 255, 255, 0.9);
            --panel-border: #d6dccf;
            --text-main: #243127;
            --text-muted: #5f6d61;
            --accent: #4b7057;
            --accent-dark: #35503d;
            --danger-bg: #f8ded8;
            --danger-text: #8a3d2e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
        }

        .card {
            width: min(420px, calc(100vw - 32px));
            padding: 32px;
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: var(--panel-bg);
            box-shadow: 0 20px 50px rgba(36, 49, 39, 0.12);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 16px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            margin-top: 8px;
            padding: 14px 16px;
            border: 1px solid #c6cec4;
            border-radius: 14px;
            font: inherit;
            background: #fff;
        }

        button {
            width: 100%;
            padding: 14px 16px;
            border: 0;
            border-radius: 14px;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        .hint {
            margin-top: 18px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .error {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
            background: var(--danger-bg);
            color: var(--danger-text);
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Admin Login</h1>
    <p>Authenticate to open the client administration page.</p>

    <#if errorMessage??>
        <div class="error">${errorMessage}</div>
    </#if>

    <form action="/login" method="post">
        <label>
            Login
            <input type="text" name="login" value="${login}" required>
        </label>

        <label>
            Password
            <input type="password" name="password" placeholder="Enter password" required>
        </label>

        <button type="submit">Open Clients Page</button>
    </form>

    <div class="hint">Default credentials: <strong>admin / admin</strong></div>
</main>
</body>
</html>
